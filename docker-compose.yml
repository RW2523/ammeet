version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ammeet
      POSTGRES_PASSWORD: ammeet_secret
      POSTGRES_DB: ammeet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ammeet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ammeet:ammeet_secret@db:5432/ammeet
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Self-hosted meeting bot (headless Chromium). Heavy + optional, so it's behind a
  # profile: enable with `docker compose --profile bots up bot-worker`.
  # Then set BOT_PROVIDER=browser and BROWSER_BOT_WORKER_URL=http://bot-worker:4500
  # in the backend env so the proxy/assistant agents drive this bot.
  bot-worker:
    build:
      context: ./bot-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["bots"]
    ports:
      - "4500:4500"
    # WebRTC media needs UDP; on Linux hosts you may prefer network_mode: host.
    shm_size: "1gb"

volumes:
  pgdata:
  redisdata:
  uploads:
